  <!-- Microsoft Clarity — deferred to idle to not block initial paint -->
  <script type="text/javascript">
    function _loadClarity() {
      (function (c, l, a, r, i, t, y) {
        c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
        t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
        y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
      })(window, document, "clarity", "script", "v7kqiem1jo");
    }
    if ('requestIdleCallback' in window) {
      requestIdleCallback(_loadClarity, { timeout: 3000 });
    } else {
      setTimeout(_loadClarity, 2000);
    }
  </script>

  <!-- UTMify UTMs -->
  <script id="utmify-utms" async defer src="https://cdn.utmify.com.br/scripts/utms/latest.js"></script>

  <script>
    // =========================================
    // CONFIG
    // =========================================
    window.pixelId = "690d203f78c9e67561d48b87";

    // =========================================
    // 1) Loads Pixel only after app mounts (SPA/React safe)
    // =========================================
    function loadUtmifyPixel() {
      var s = document.createElement("script");
      s.async = true;
      s.src = "https://cdn.utmify.com.br/scripts/pixel/pixel.js";
      document.head.appendChild(s);
    }

    function waitForAppThenLoadPixel() {
      var start = Date.now();

      (function check() {
        var root = document.querySelector("#root");
        var rootHasContent = !!(root && root.children && root.children.length);
        var clickableCount = document.querySelectorAll("button, a[href]").length;

        if ((rootHasContent && clickableCount >= 10) || Date.now() - start > 3000) {
          loadUtmifyPixel();
          return;
        }
        requestAnimationFrame(check);
      })();
    }

    (function bootstrapTracking() {
      var utms = document.getElementById("utmify-utms");
      if (utms) {
        utms.addEventListener("load", function () {
          setTimeout(waitForAppThenLoadPixel, 0);
        });
        utms.addEventListener("error", function () {
          waitForAppThenLoadPixel();
        });
      } else {
        window.addEventListener("load", waitForAppThenLoadPixel);
      }
    })();

    // =========================================
    // 2) Persist UTMs on links
    // =========================================
    (function persistParamsOnLinks() {
      var params = new URLSearchParams(location.search);
      if (!params || !params.toString()) return;

      var keep = [
        "utm_source", "utm_medium", "utm_campaign", "utm_content", "utm_term",
        "fbclid", "gclid", "ttclid", "wbraid", "gbraid",
        "src", "sck", "xcod", "subid", "subid2",
      ];

      function shouldDecorate(href) {
        if (!href) return false;
        if (href.startsWith("#") || href.startsWith("mailto:") || href.startsWith("tel:"))
          return false;
        return true;
      }

      function decorate(a) {
        try {
          var href = a.getAttribute("href");
          if (!shouldDecorate(href)) return;
          var url = new URL(href, location.origin);
          keep.forEach(function (k) {
            var v = params.get(k);
            if (v && !url.searchParams.has(k)) url.searchParams.set(k, v);
          });
          a.setAttribute("href", url.toString());
        } catch (e) { }
      }

      function scan() {
        document.querySelectorAll("a[href]").forEach(decorate);
      }

      var scheduled = false;
      function scheduleScan() {
        if (scheduled) return;
        scheduled = true;
        requestAnimationFrame(function () {
          scheduled = false;
          scan();
        });
      }

      scan();
      new MutationObserver(scheduleScan).observe(document.body, {
        childList: true,
        subtree: true,
      });
    })();
  </script>
